<div class="container-xxl py-5">
  <div class="container">
    <div class="text-center mb-5">
      <h6 class="section-title bg-white text-center text-primary px-3">Premium</h6>
      <h1 class="mb-3">Premium Courses</h1>
      <p class="text-muted mb-0">
        Explore all premium courses available on the platform.
      </p>
    </div>

    <div *ngIf="isLoading" class="text-center py-5">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
      <p class="mt-3 text-muted">Loading premium courses...</p>
    </div>

    <div *ngIf="!isLoading && errorMessage" class="alert alert-danger">
      {{ errorMessage }}
    </div>

    <ng-container *ngIf="!isLoading && !errorMessage">
      <div *ngIf="premiumSubscriptions.length === 0" class="text-center py-5">
        <i class="fa fa-crown fa-3x text-muted mb-3"></i>
        <p class="text-muted mb-2">No premium courses available at the moment.</p>
        <a routerLink="/dashboard" class="btn btn-outline-primary">
          <i class="fa fa-home me-2"></i>Back to Dashboard
        </a>
      </div>

      <div class="row g-4 justify-content-center" *ngIf="premiumSubscriptions.length > 0">
        <div class="col-lg-4 col-md-6" *ngFor="let sub of premiumSubscriptions">
          <div class="course-item bg-light h-100">
            <div class="position-relative overflow-hidden">
              <img
                *ngIf="sub.courseImage; else defaultImage"
                class="img-fluid"
                [src]="sub.courseImage"
                [alt]="sub.courseName"
                style="width: 100%; height: 200px; object-fit: cover;"
              />
              <ng-template #defaultImage>
                <img
                  class="img-fluid"
                  src="assets/img/course-1.jpg"
                  [alt]="sub.courseName"
                  style="width: 100%; height: 200px; object-fit: cover;"
                />
              </ng-template>

              <div class="w-100 d-flex justify-content-center position-absolute bottom-0 start-0 mb-4">
                <button
                  type="button"
                  class="flex-shrink-0 btn btn-sm btn-primary px-3 me-2"
                  style="border-radius: 30px;"
                  (click)="goToPayment(sub.courseId)"
                >
                  Buy / Subscribe
                </button>
                <button
                  type="button"
                  class="flex-shrink-0 btn btn-sm btn-outline-light px-3"
                  style="border-radius: 30px;"
                  (click)="goToCourse(sub.courseId)"
                >
                  View Details
                </button>
              </div>
            </div>
            <div class="text-center p-4 pb-0">
              <h5 class="mb-3">{{ sub.courseName }}</h5>
              <p class="text-muted mb-1" *ngIf="sub.instituteName">
                <i class="fa fa-building text-primary me-2"></i>{{ sub.instituteName }}
              </p>
              <p class="text-muted mb-2">
                <i class="fa fa-crown text-warning me-2"></i>{{ sub.plan }} - ₹{{ sub.price }}
              </p>
            </div>
          </div>
        </div>
      </div>
    </ng-container>
  </div>
</div>
